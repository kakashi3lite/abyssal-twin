name: iort-dt

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  acoustic_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  grafana_data: {}
  prometheus_data: {}
  mlflow_data: {}
  stonefish_cache: {}

# ─── Logging defaults ────────────────────────────────────────────────────────
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

# ─── Services ─────────────────────────────────────────────────────────────────
services:

  # ── Zenoh Router: Acoustic Link Simulator ─────────────────────────────────
  zenoh-router:
    image: eclipse/zenoh:latest
    container_name: iort_zenoh
    networks:
      acoustic_net:
        ipv4_address: 172.28.0.10
    ports:
      - "7447:7447/tcp"
      - "7447:7447/udp"
    volumes:
      - ./zenoh/acoustic.json5:/etc/zenoh/zenoh.json5:ro
    command: ["-c", "/etc/zenoh/zenoh.json5"]
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:7447 2>&1 || true"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    logging: *default-logging

  # ── Stonefish Simulator (stub — see docker/stonefish/Dockerfile) ──────────
  stonefish-sim:
    build:
      context: ./stonefish
      dockerfile: Dockerfile
    container_name: iort_stonefish
    networks:
      acoustic_net:
        ipv4_address: 172.28.0.20
    environment:
      - ROS_DOMAIN_ID=42
      - RMW_IMPLEMENTATION=rmw_zenoh_cpp
      - ZENOH_ROUTER_IP=172.28.0.10
    volumes:
      - ../configs/auv_models:/workspace/auv_models:ro
      - ../configs/scenarios:/workspace/scenarios:ro
      - stonefish_cache:/root/.stonefish
    depends_on:
      zenoh-router:
        condition: service_healthy
    restart: on-failure:3
    logging: *default-logging

  # ── ROS 2 Workspace (stub — see docker/ros2/Dockerfile) ──────────────────
  ros2:
    build:
      context: ..
      dockerfile: docker/ros2/Dockerfile
    container_name: iort_ros2
    networks:
      acoustic_net:
        ipv4_address: 172.28.0.30
    environment:
      - ROS_DOMAIN_ID=42
      - RMW_IMPLEMENTATION=rmw_zenoh_cpp
      - ZENOH_ROUTER_IP=172.28.0.10
      - IORT_DT_AUV_COUNT=2
    volumes:
      - ../src:/workspace/src:ro
      - ../configs:/workspace/configs:ro
      - ../experiments:/workspace/experiments
    depends_on:
      zenoh-router:
        condition: service_healthy
      stonefish-sim:
        condition: service_healthy
    restart: on-failure:3
    logging: *default-logging

  # ── IoRT-DT Federation Node (Rust binary) ─────────────────────────────────
  federation:
    build:
      context: ..
      dockerfile: docker/federation/Dockerfile
    container_name: iort_federation
    networks:
      acoustic_net:
        ipv4_address: 172.28.0.40
    environment:
      - ZENOH_ROUTER=tcp/172.28.0.10:7447
      - AUV_ID=0
      - AUV_COUNT=2
      - GOSSIP_INTERVAL_MS=500
      - PARTITION_TIMEOUT_S=30
      - RUST_LOG=iort_dt_federation=info
    depends_on:
      zenoh-router:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: iort_prometheus
    networks:
      - acoustic_net
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped
    logging: *default-logging

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: iort_grafana
    networks:
      - acoustic_net
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./observability/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    logging: *default-logging

  # ── MLflow Tracking Server ─────────────────────────────────────────────────
  mlflow:
    image: python:3.12-slim
    container_name: iort_mlflow
    networks:
      - acoustic_net
    ports:
      - "5050:5000"
    volumes:
      - mlflow_data:/mlruns
    command: >
      bash -c "pip install mlflow -q &&
               mlflow server --host 0.0.0.0 --port 5000
               --backend-store-uri sqlite:///mlruns/mlflow.db
               --default-artifact-root /mlruns/artifacts"
    restart: unless-stopped
    logging: *default-logging

# ─── Profiles ─────────────────────────────────────────────────────────────────
# Usage: docker compose --profile fleet4 up
# For 4-AUV fleet testing (RQ2)
