<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌊 Abyssal Twin — Mission Control</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-primary: #0a0e27;
      --bg-secondary: #141b2d;
      --bg-tertiary: #1a2332;
      --border-color: #2a3a4f;
      --text-primary: #e0e6ed;
      --text-secondary: #8b9dc3;
      --accent-primary: #64d2ff;
      --accent-success: #4ade80;
      --accent-warning: #fbbf24;
      --accent-danger: #f87171;
      --font-mono: 'SF Mono', Monaco, 'Cascadia Code', monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    [data-theme="light"] {
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f1f5f9;
      --border-color: #e2e8f0;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --accent-primary: #0284c7;
    }
    
    body {
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    /* Header */
    .header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .brand {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    
    .brand h1 {
      font-size: 1.5rem;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-success));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .connection-status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      color: var(--text-secondary);
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-success);
      animation: pulse 2s infinite;
    }
    
    .status-dot.disconnected {
      background: var(--accent-danger);
      animation: none;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    /* Toolbar */
    .toolbar {
      background: var(--bg-tertiary);
      padding: 0.75rem 2rem;
      display: flex;
      gap: 1rem;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
      flex-wrap: wrap;
    }
    
    .toolbar button {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.875rem;
      transition: all 0.2s;
    }
    
    .toolbar button:hover {
      border-color: var(--accent-primary);
    }
    
    .toolbar button.primary {
      background: var(--accent-primary);
      color: var(--bg-primary);
      border-color: var(--accent-primary);
    }
    
    .toolbar select {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 0.5rem;
      border-radius: 6px;
    }
    
    /* Dashboard Grid */
    .dashboard {
      padding: 2rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 1.5rem;
    }
    
    .widget {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .widget:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }
    
    .widget-header {
      background: var(--bg-tertiary);
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
    }
    
    .widget-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--accent-primary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .widget-controls {
      display: flex;
      gap: 0.5rem;
    }
    
    .widget-controls button {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 0.25rem;
      border-radius: 4px;
    }
    
    .widget-controls button:hover {
      background: var(--bg-secondary);
      color: var(--text-primary);
    }
    
    .widget-body {
      padding: 1rem;
      min-height: 200px;
    }
    
    /* Metrics */
    .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
    }
    
    .metric-item {
      background: var(--bg-tertiary);
      padding: 1rem;
      border-radius: 8px;
      border: 1px solid var(--border-color);
    }
    
    .metric-label {
      font-size: 0.75rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.5rem;
    }
    
    .metric-value {
      font-size: 1.75rem;
      font-weight: 700;
      font-family: var(--font-mono);
    }
    
    .metric-trend {
      font-size: 0.75rem;
      margin-top: 0.25rem;
    }
    
    .trend-up { color: var(--accent-success); }
    .trend-down { color: var(--accent-danger); }
    
    /* Fleet Status */
    .auv-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    
    .auv-item {
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      gap: 1rem;
      align-items: center;
      padding: 0.875rem;
      background: var(--bg-tertiary);
      border-radius: 8px;
      border: 1px solid var(--border-color);
    }
    
    .auv-id {
      width: 48px;
      height: 48px;
      background: var(--bg-primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-family: var(--font-mono);
    }
    
    .auv-info h4 {
      font-size: 0.9375rem;
      margin-bottom: 0.25rem;
    }
    
    .auv-meta {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }
    
    .auv-status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
    }
    
    .auv-latency {
      font-family: var(--font-mono);
      font-size: 0.875rem;
      color: var(--text-secondary);
    }
    
    /* AUV Cards (dynamic fleet widget) */
    .fleet-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 0.875rem;
    }

    .auv-card {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 0.875rem;
      transition: border-color 0.2s;
    }

    .auv-card.online  { border-left: 3px solid var(--accent-success); }
    .auv-card.partitioned { border-left: 3px solid var(--accent-warning); }
    .auv-card.offline { border-left: 3px solid var(--accent-danger); }

    .auv-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.625rem;
    }

    .auv-name {
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text-primary);
    }

    .auv-telemetry {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .telem-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
    }

    .telem-label {
      color: var(--text-secondary);
      flex-shrink: 0;
    }

    .telem-value {
      font-family: var(--font-mono);
      color: var(--accent-primary);
      font-size: 0.8rem;
    }

    .telem-battery {
      gap: 0.5rem;
    }

    .battery-bar {
      flex: 1;
      height: 6px;
      background: var(--bg-primary);
      border-radius: 3px;
      overflow: hidden;
      margin: 0 0.4rem;
    }

    .battery-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s ease, background 0.3s;
    }

    .auv-alert {
      margin-top: 0.5rem;
      font-size: 0.78rem;
      color: var(--accent-warning);
      font-weight: 500;
    }

    /* Charts */
    .chart-container {
      position: relative;
      height: 250px;
    }
    
    /* Events */
    .event-list {
      max-height: 300px;
      overflow-y: auto;
    }
    
    .event-item {
      display: flex;
      gap: 0.75rem;
      padding: 0.75rem;
      border-bottom: 1px solid var(--border-color);
      font-size: 0.875rem;
    }
    
    .event-time {
      color: var(--text-secondary);
      font-family: var(--font-mono);
      font-size: 0.75rem;
      white-space: nowrap;
    }
    
    .event-badge {
      padding: 0.125rem 0.5rem;
      border-radius: 4px;
      font-size: 0.625rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .badge-sync { background: rgba(100, 210, 255, 0.2); color: var(--accent-primary); }
    .badge-anomaly { background: rgba(248, 113, 113, 0.2); color: var(--accent-danger); }
    .badge-mission { background: rgba(74, 222, 128, 0.2); color: var(--accent-success); }
    .badge-system { background: rgba(139, 157, 195, 0.2); color: var(--text-secondary); }
    
    /* Settings Panel */
    .settings-panel {
      position: fixed;
      right: -400px;
      top: 0;
      width: 400px;
      height: 100vh;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border-color);
      z-index: 200;
      transition: right 0.3s ease;
      overflow-y: auto;
    }
    
    .settings-panel.open {
      right: 0;
    }
    
    .settings-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .settings-body {
      padding: 1.5rem;
    }
    
    .setting-group {
      margin-bottom: 2rem;
    }
    
    .setting-label {
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      display: block;
    }
    
    .setting-option {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem;
      background: var(--bg-tertiary);
      border-radius: 8px;
      margin-bottom: 0.5rem;
      cursor: pointer;
    }
    
    .setting-option:hover {
      background: var(--bg-primary);
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .dashboard {
        grid-template-columns: 1fr;
        padding: 1rem;
      }
      
      .metric-grid {
        grid-template-columns: 1fr;
      }
      
      .header {
        padding: 1rem;
      }
      
      .brand h1 {
        font-size: 1.25rem;
      }
    }
    
    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--text-secondary);
    }
    
    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border-color);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 0.75rem;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Export Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 300;
    }
    
    .modal-overlay.open {
      display: flex;
    }
    
    .modal {
      background: var(--bg-secondary);
      border-radius: 12px;
      width: 90%;
      max-width: 500px;
      border: 1px solid var(--border-color);
    }
    
    .modal-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border-color);
    }
    
    .modal-body {
      padding: 1.5rem;
    }
    
    .modal-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border-color);
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
    }
    
    .form-group {
      margin-bottom: 1rem;
    }
    
    .form-label {
      display: block;
      font-size: 0.875rem;
      margin-bottom: 0.5rem;
      color: var(--text-secondary);
    }
    
    .form-input, .form-select {
      width: 100%;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 0.75rem;
      border-radius: 6px;
    }
  
    /* Demo Mode Banner */
    .demo-banner {
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: white;
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 0.875rem;
      border-bottom: 1px solid var(--border-color);
    }
    
    .demo-pulse {
      animation: demo-pulse 2s infinite;
      font-size: 1.25rem;
    }
    
    @keyframes demo-pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }
    
    .demo-text {
      flex: 1;
    }
    
    .demo-link {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 0.25rem 0.75rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.75rem;
      margin-left: 0.5rem;
      transition: background 0.2s;
    }
    
    .demo-link:hover {
      background: rgba(255,255,255,0.3);
    }
    
    .demo-close {
      background: none;
      border: none;
      color: white;
      font-size: 1.25rem;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    
    .demo-close:hover {
      opacity: 1;
    }
    
    /* Status indicators */
    .status-pass { color: var(--accent-success); font-weight: 600; }
    .status-fail { color: var(--accent-danger); font-weight: 600; }
</style>
</head>
<body>
  <header class="header">
    <div class="brand">
      <h1>🌊 Abyssal Twin</h1>
      <span style="color: var(--text-secondary);">|</span>
      <span style="color: var(--text-secondary); font-size: 0.875rem;">Mission Control</span>
    </div>
    <div class="connection-status">
      <span class="status-dot" id="connectionDot"></span>
      <span id="connectionText">Connecting...</span>
      <span style="margin-left: 1rem; color: var(--text-secondary);">|</span>
      <span id="timestamp" style="margin-left: 1rem; font-family: var(--font-mono); font-size: 0.875rem;"></span>
    </div>
  </header>
  
  <div class="toolbar">
    <button class="primary" onclick="refreshAll()">🔄 Refresh</button>
    <button onclick="toggleSettings()">⚙️ Settings</button>
    <button onclick="openExport()">📥 Export</button>
    <select id="timeRange" onchange="updateTimeRange()">
      <option value="1h">Last Hour</option>
      <option value="6h">Last 6 Hours</option>
      <option value="24h" selected>Last 24 Hours</option>
      <option value="7d">Last 7 Days</option>
    </select>
    <select id="fleetSelect">
      <option value="reef-expedition">Reef Expedition 2024</option>
      <option value="deep-dive">Deep Dive Mission</option>
    </select>
    <button onclick="toggleTheme()">🌓 Theme</button>
    <button onclick="addWidget()">➕ Add Widget</button>
  </div>
  
  <main class="dashboard" id="dashboard">
    <!-- Widgets will be dynamically added here -->
  </main>
  
  <!-- Settings Panel -->
  <aside class="settings-panel" id="settingsPanel">
    <div class="settings-header">
      <h3>Settings</h3>
      <button onclick="toggleSettings()">✕</button>
    </div>
    <div class="settings-body">
      <div class="setting-group">
        <label class="setting-label">Dashboard Layout</label>
        <div class="setting-option" onclick="setLayout('grid')">
          <input type="radio" name="layout" value="grid" checked> Grid View
        </div>
        <div class="setting-option" onclick="setLayout('list')">
          <input type="radio" name="layout" value="list"> List View
        </div>
      </div>
      
      <div class="setting-group">
        <label class="setting-label">Auto-Refresh</label>
        <div class="setting-option">
          <input type="checkbox" id="autoRefresh" checked> Enable auto-refresh (5s)
        </div>
      </div>
      
      <div class="setting-group">
        <label class="setting-label">Notifications</label>
        <div class="setting-option">
          <input type="checkbox" id="notifyAnomalies" checked> Anomaly alerts
        </div>
        <div class="setting-option">
          <input type="checkbox" id="notifyOffline" checked> Vehicle offline
        </div>
      </div>
      
      <div class="setting-group">
        <label class="setting-label">Data Export Format</label>
        <select class="form-select" id="defaultExportFormat">
          <option value="csv">CSV</option>
          <option value="json">JSON</option>
          <option value="png">PNG (Charts)</option>
        </select>
      </div>
      
      <button class="primary" onclick="saveSettings()" style="width: 100%;">Save Settings</button>
    </div>
  </aside>
  
  <!-- Export Modal -->
  <div class="modal-overlay" id="exportModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Export Data</h3>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Data Type</label>
          <select class="form-select" id="exportType">
            <option value="fleet">Fleet Status</option>
            <option value="anomalies">Anomalies</option>
            <option value="metrics">Research Metrics (RQ1-RQ3)</option>
            <option value="state-vectors">State Vectors</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Format</label>
          <select class="form-select" id="exportFormat">
            <option value="csv">CSV</option>
            <option value="json">JSON</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Time Range</label>
          <select class="form-select" id="exportRange">
            <option value="1h">Last Hour</option>
            <option value="24h">Last 24 Hours</option>
            <option value="7d">Last 7 Days</option>
            <option value="30d">Last 30 Days</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button onclick="closeExport()">Cancel</button>
        <button class="primary" onclick="exportData()">Export</button>
      </div>
    </div>
  </div>
  
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
