name: Bug Report
description: Report a bug in abyssal-twin
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
        
  - type: input
    id: version
    attributes:
      label: Version
      description: What version are you running?
      placeholder: v0.1.0-alpha
    validations:
      required: true
      
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component is affected?
      options:
        - Federation (Rust)
        - Anomaly Detection (Python)
        - Compression (Python)
        - Stonefish Simulator
        - ROS 2 Integration
        - Docker/CI
        - Documentation
        - Other
    validations:
      required: true
      
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug
      placeholder: A clear description of what went wrong
    validations:
      required: true
      
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run '...'
        2. Configure '...'
        3. See error
    validations:
      required: true
      
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
      
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant logs (sanitized)
      render: shell
