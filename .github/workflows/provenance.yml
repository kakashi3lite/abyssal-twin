name: 🔐 Build, Attest & Publish

on:
  push:
    tags: ['v*']
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Security Scan
  # ═══════════════════════════════════════════════════════════════════════════
  security-scan:
    name: 🔒 Security Scan (Trivy)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Check for CRITICAL vulnerabilities
        run: |
          if grep -q "CRITICAL" trivy-results.sarif 2>/dev/null; then
            echo "::error::CRITICAL vulnerabilities found!"
            exit 1
          fi

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-fs'

  # ═══════════════════════════════════════════════════════════════════════════
  # Lint & Static Analysis
  # ═══════════════════════════════════════════════════════════════════════════
  lint:
    name: 🧹 Lint
    runs-on: ubuntu-24.04
    needs: security-scan
    steps:
      - uses: actions/checkout@v4

      - name: Dockerfile lint (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./stonefish/Dockerfile
          ignore: DL3008,DL3013

      - name: ShellCheck scripts
        run: |
          find scripts/ -name "*.sh" -exec shellcheck {} \; 2>/dev/null || true

      - name: Python lint (Ruff)
        run: |
          pip install ruff -q
          ruff check src/ tests/ || true

  # ═══════════════════════════════════════════════════════════════════════════
  # Build Federation Image
  # ═══════════════════════════════════════════════════════════════════════════
  build-federation:
    name: ⚙️ Build Federation
    runs-on: ubuntu-24.04
    needs: [security-scan, lint]
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/federation
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/federation/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        if: github.event_name != 'pull_request'
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/federation@${{ steps.build.outputs.digest }}

  # ═══════════════════════════════════════════════════════════════════════════
  # Summary
  # ═══════════════════════════════════════════════════════════════════════════
  publish-summary:
    name: 📊 Summary
    needs: [build-federation]
    runs-on: ubuntu-24.04
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## 🔐 Supply Chain Attestation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Status | Digest |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| federation | ${{ needs.build-federation.result }} | ${{ needs.build-federation.outputs.digest }} |" >> $GITHUB_STEP_SUMMARY
