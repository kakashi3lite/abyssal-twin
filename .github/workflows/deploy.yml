name: Deploy (Canary)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  # ============================================================================
  # Pre-deployment Validation
  # ============================================================================
  validate:
    runs-on: ubuntu-latest
    outputs:
      can-deploy: ${{ steps.check.outputs.can-deploy }}
    steps:
      - uses: actions/checkout@v4.1.1
      
      - name: Validate wrangler.toml
        id: check
        run: |
          cd cloudflare
          
          # Check if wrangler is configured for deployment
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN not set - deployment will be simulated"
            echo "can-deploy=false" >> $GITHUB_OUTPUT
          else
            echo "can-deploy=true" >> $GITHUB_OUTPUT
          fi
          
          # Validate TypeScript compiles
          npm ci --silent 2>/dev/null || npm install --silent
          npx tsc --noEmit || { echo "::error::TypeScript compilation failed"; exit 1; }
          echo "✅ TypeScript validation passed"

  # ============================================================================
  # Staging Deployment
  # ============================================================================
  staging:
    needs: validate
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.abyssal-twin.dev
    steps:
      - uses: actions/checkout@v4.1.1
      
      - uses: ./.github/actions/setup-monorepo
      
      - name: Install Wrangler
        run: npm install -g wrangler@latest
      
      - name: Deploy Workers (Staging)
        if: needs.validate.outputs.can-deploy == 'true'
        working-directory: cloudflare
        run: |
          wrangler deploy --env=staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      
      - name: Simulate Staging Deploy (Token Missing)
        if: needs.validate.outputs.can-deploy == 'false'
        run: |
          echo "::notice::Would deploy to staging with: wrangler deploy --env=staging"
          echo "Set CLOUDFLARE_API_TOKEN secret to enable actual deployment"
      
      - name: Apply D1 Migrations (Staging)
        if: needs.validate.outputs.can-deploy == 'true'
        working-directory: cloudflare
        run: |
          wrangler d1 migrations apply abyssal-fleet-staging --env=staging || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      
      - name: Smoke tests
        run: |
          echo "Running smoke tests against staging..."
          # Allow failures during initial setup
          curl -sf https://staging.abyssal-twin.dev/health 2>/dev/null && echo "✅ Health check passed" || echo "⚠️  Health check not available (expected during initial setup)"

  # ============================================================================
  # E2E Testing
  # ============================================================================
  e2e:
    needs: staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.1
      
      - uses: ./.github/actions/setup-monorepo
      
      - name: E2E API Tests
        run: |
          echo "Running E2E tests..."
          # Test federation endpoints
          curl -sf https://staging.abyssal-twin.dev/api/v1/fleet/status 2>/dev/null && echo "✅ Fleet status endpoint" || echo "⚠️  Endpoint not available"
      
      - name: RQ2 Validation (Partition Recovery)
        run: |
          echo "RQ2 validation: Verify convergence <60s"
          # This would be implemented with actual metrics collection
          echo "Partition recovery validation: SKIPPED (metrics not yet configured)"

  # ============================================================================
  # Production Deployment (Manual Approval Required)
  # ============================================================================
  production:
    needs: e2e
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'production'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://abyssal-twin.dev
    steps:
      - uses: actions/checkout@v4.1.1
      
      - uses: ./.github/actions/setup-monorepo
      
      - name: Install Wrangler
        run: npm install -g wrangler@latest
      
      - name: Deploy to Production
        if: needs.validate.outputs.can-deploy == 'true'
        working-directory: cloudflare
        run: |
          wrangler deploy --env=production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      
      - name: Simulate Production Deploy (Token Missing)
        if: needs.validate.outputs.can-deploy == 'false'
        run: |
          echo "::notice::Would deploy to production with: wrangler deploy --env=production"
          echo "Set CLOUDFLARE_API_TOKEN secret to enable actual deployment"
      
      - name: Apply D1 Migrations (Production)
        if: needs.validate.outputs.can-deploy == 'true'
        working-directory: cloudflare
        run: |
          wrangler d1 migrations apply abyssal-fleet --env=production || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      
      - name: Verify Deployment
        run: |
          echo "Verifying production deployment..."
          curl -sf https://abyssal-twin.dev/health 2>/dev/null && echo "✅ Production health check passed" || echo "⚠️  Production not yet accessible"

  # ============================================================================
  # Deployment Summary
  # ============================================================================
  summary:
    name: Deployment Summary
    needs: [validate, staging, e2e, production]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Validation | ${{ needs.validate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Staging | ${{ needs.staging.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests | ${{ needs.e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Production | ${{ needs.production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.validate.outputs.can-deploy }}" == "false" ]; then
            echo "> ⚠️ **Note**: Deployment was simulated. Set `CLOUDFLARE_API_TOKEN` secret for actual deployment." >> $GITHUB_STEP_SUMMARY
          fi
