name: 🚀 Deploy Dashboard to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'mission-control/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        type: choice
        options:
          - staging
          - production
        default: 'staging'

concurrency:
  group: deploy-dashboard-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

env:
  NODE_OPTIONS: '--max-old-space-size=4096'

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Build & Test
  # ═══════════════════════════════════════════════════════════════════════════
  build:
    name: 🏗️ Build Dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mission-control
    steps:
      - uses: actions/checkout@v4.1.1
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mission-control/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Type check
        run: npx tsc --noEmit
      
      - name: Build
        run: npm run build
        env:
          VITE_API_BASE: ${{ github.event.inputs.environment == 'production' && 'https://api.abyssal-twin.dev' || 'https://staging.abyssal-twin.dev' }}
          VITE_WS_URL: ${{ github.event.inputs.environment == 'production' && 'wss://api.abyssal-twin.dev/ws/live' || 'wss://staging.abyssal-twin.dev/ws/live' }}
      
      - name: Verify build output
        run: |
          ls -la dist/
          test -f dist/index.html || (echo "❌ index.html missing" && exit 1)
          test -d dist/assets || (echo "❌ assets folder missing" && exit 1)
          echo "✅ Build verification passed"
      
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-build
          path: mission-control/dist
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════════════════
  # Deploy to Cloudflare Pages
  # ═══════════════════════════════════════════════════════════════════════════
  deploy:
    name: ☁️ Deploy to Cloudflare
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dashboard-build
          path: dist
      
      - name: Verify artifact
        run: |
          ls -la dist/
          test -f dist/index.html || (echo "❌ index.html not found in artifact" && exit 1)
      
      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: abyssal-mission-control
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: '3'
      
      - name: Comment deployment URL
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `🚀 Dashboard deployed: ${url}`
            });

  # ═══════════════════════════════════════════════════════════════════════════
  # Smoke Test
  # ═══════════════════════════════════════════════════════════════════════════
  smoke-test:
    name: 🧪 Smoke Test
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment
        run: sleep 30
      
      - name: Test dashboard accessibility
        run: |
          URL="${{ needs.deploy.outputs.url }}"
          echo "Testing $URL"
          curl -sf "$URL" > /dev/null && echo "✅ Dashboard accessible" || (echo "❌ Dashboard not accessible" && exit 1)
          
          # Check for key assets
          curl -sf "$URL/assets/" > /dev/null && echo "✅ Assets accessible" || echo "⚠️ Assets check skipped"
      
      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: ${{ needs.deploy.outputs.url }}
          uploadArtifacts: true
          temporaryPublicStorage: true
