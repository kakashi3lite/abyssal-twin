name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'mission-control/**'
      - '.github/workflows/cloudflare-pages.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        type: choice
        options:
          - staging
          - production
        default: 'production'

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

env:
  # Default to production if not triggered via workflow_dispatch
  DEPLOY_ENV: ${{ github.event.inputs.environment || 'production' }}

jobs:
  build:
    name: Build for Cloudflare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mission-control/package-lock.json

      - name: Clean install dependencies
        working-directory: mission-control
        run: |
          # Remove any corrupted node_modules
          rm -rf node_modules
          # Use npm install with timeout and better network settings
          npm install --prefer-offline --no-audit --progress=false
        env:
          NPM_CONFIG_TIMEOUT: 120000
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/

      - name: Build for Cloudflare
        working-directory: mission-control
        run: npm run build
        env:
          NODE_ENV: production
          VITE_API_BASE: ${{ env.DEPLOY_ENV == 'production' && 'https://api.abyssal-twin.dev' || 'https://staging.abyssal-twin.dev' }}
          VITE_WS_URL: ${{ env.DEPLOY_ENV == 'production' && 'wss://api.abyssal-twin.dev/ws/live' || 'wss://staging.abyssal-twin.dev/ws/live' }}
          VITE_SSE_URL: ${{ env.DEPLOY_ENV == 'production' && 'https://api.abyssal-twin.dev/api/v1/fleet/stream' || 'https://staging.abyssal-twin.dev/api/v1/fleet/stream' }}
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}

      - name: Verify build
        working-directory: mission-control
        run: |
          ls -la dist/
          test -f dist/index.html || (echo "❌ index.html missing" && exit 1)
          test -d dist/assets || (echo "❌ assets folder missing" && exit 1)
          echo "✅ Build verified"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-build-${{ env.DEPLOY_ENV }}
          path: mission-control/dist
          retention-days: 1

  deploy:
    name: Deploy to Cloudflare
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: ${{ env.DEPLOY_ENV == 'production' && 'cloudflare-production' || 'cloudflare-staging' }}
      url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: cloudflare-build-${{ env.DEPLOY_ENV }}
          path: dist

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler@3

      - name: Deploy to Cloudflare Pages
        id: deploy
        working-directory: mission-control
        run: |
          echo "Deploying to ${{ env.DEPLOY_ENV }} environment..."
          
          # Deploy using wrangler CLI
          # This creates the project automatically if it doesn't exist
          OUTPUT=$(wrangler pages deploy ../dist \
            --project-name="${{ env.DEPLOY_ENV == 'production' && 'abyssal-mission-control' || 'abyssal-mission-control-staging' }}" \
            --branch="${{ github.ref_name }}" \
            --commit-hash="${{ github.sha }}" \
            --commit-message="${{ github.event.head_commit.message }}" \
            --compatibility-date="2026-03-06" 2>&1)
          
          echo "$OUTPUT"
          
          # Extract the deployment URL from output
          URL=$(echo "$OUTPUT" | grep -oE 'https://[a-z0-9-]+\.pages\.dev' | head -1)
          echo "deployment-url=$URL" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment deployment URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const env = '${{ env.DEPLOY_ENV }}';
            const url = '${{ steps.deploy.outputs.deployment-url }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Cloudflare ${env} deployment ready**\n\n🔗 ${url}`
            });

      - name: Deployment Summary
        run: |
          echo "## 🚀 Cloudflare Pages Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ env.DEPLOY_ENV }} |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | ${{ steps.deploy.outputs.deployment-url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
