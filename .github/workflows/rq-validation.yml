name: Research Question Validation

on:
  pull_request:
    paths:
      - 'src/**'
      - 'docker/**'
      - 'experiments/**'
      - 'tests/**'
  workflow_dispatch:
    inputs:
      rq_filter:
        description: 'Filter RQs to run (rq1,rq2,rq3,rq4,all)'
        default: 'all'
        required: false
        type: string

env:
  PYTHON_VERSION: "3.12"
  RUST_VERSION: "1.75"
  RQ1_F1_THRESHOLD: "0.90"
  RQ1_COMPRESSION_THRESHOLD: "10.0"
  RQ3_ARL0_THRESHOLD: "10000"
  RQ3_DETECTION_THRESHOLD: "120"

permissions:
  contents: read
  checks: write

jobs:
  rq1-compression:
    name: RQ1 — Compression Ratio & Sync Quality
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install poetry
          poetry install --with dev
      - name: Run RQ1 property tests
        run: |
          poetry run pytest tests/property/test_rq1_bounds.py -v --tb=short --timeout=120
      - name: Run RQ1 validation
        run: |
          poetry run python experiments/rq1_sync_tradeoff/validate.py \
            --output results/rq1-metrics.json --seed 42
      - name: Validate compression ratio >10:1
        run: |
          RATIO=$(jq '.compression_ratio' results/rq1-metrics.json)
          echo "Compression ratio: $RATIO:1"
          if (( $(echo "$RATIO < ${{ env.RQ1_COMPRESSION_THRESHOLD }}" | bc -l) )); then
            echo "RQ1 FAILED: Compression ratio $RATIO < ${{ env.RQ1_COMPRESSION_THRESHOLD }}"
            exit 1
          fi
          echo "RQ1 compression threshold met"
      - name: Validate F1 score >0.90
        run: |
          F1=$(jq '.f1_score' results/rq1-metrics.json)
          echo "F1 score: $F1"
          if (( $(echo "$F1 < ${{ env.RQ1_F1_THRESHOLD }}" | bc -l) )); then
            echo "RQ1 FAILED: F1 score $F1 < ${{ env.RQ1_F1_THRESHOLD }}"
            exit 1
          fi
          echo "RQ1 F1 threshold met"
      - name: Upload RQ1 metrics
        uses: actions/upload-artifact@v4
        with:
          name: rq1-results
          path: results/rq1-metrics.json
          retention-days: 30

  rq2-federation:
    name: RQ2 — Federated Coordination
    runs-on: ubuntu-24.04
    needs: rq1-compression
    timeout-minutes: 20
    if: github.event.inputs.rq_filter == 'all' || github.event.inputs.rq_filter == 'rq2' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/iort_dt_federation/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src/iort_dt_federation/Cargo.toml') }}
      - name: Build federation
        run: cargo build --manifest-path src/iort_dt_federation/Cargo.toml --release
      - name: Run gossip protocol tests
        run: cargo test --manifest-path src/iort_dt_federation/Cargo.toml --release -- --nocapture

  rq3-anomaly-detection:
    name: RQ3 — Anomaly Detection & ARL Bounds
    runs-on: ubuntu-24.04
    needs: rq1-compression
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install poetry
          poetry install --with dev
      - name: Run RQ3 property tests
        run: poetry run pytest tests/property/test_rq3_arl.py -v --tb=short --timeout=300
      - name: Run RQ3 validation
        run: poetry run python experiments/rq3_anomaly/validate.py --output results/rq3-metrics.json
      - name: Validate ARL0 > 10,000
        run: |
          ARL0=$(jq '.arl0' results/rq3-metrics.json)
          echo "ARL0: $ARL0"
          if (( $(echo "$ARL0 < ${{ env.RQ3_ARL0_THRESHOLD }}" | bc -l) )); then
            echo "RQ3 FAILED: ARL0 $ARL0 < ${{ env.RQ3_ARL0_THRESHOLD }}"
            exit 1
          fi
          echo "RQ3 ARL0 threshold met"
      - name: Validate detection delay <120s
        run: |
          DELAY=$(jq '.detection_delay_seconds' results/rq3-metrics.json)
          echo "Detection delay: ${DELAY}s"
          if (( $(echo "$DELAY > ${{ env.RQ3_DETECTION_THRESHOLD }}" | bc -l) )); then
            echo "RQ3 FAILED: Detection delay ${DELAY}s > ${{ env.RQ3_DETECTION_THRESHOLD }}s"
            exit 1
          fi
          echo "RQ3 detection delay threshold met"
      - name: Upload RQ3 metrics
        uses: actions/upload-artifact@v4
        with:
          name: rq3-results
          path: results/rq3-metrics.json
          retention-days: 30

  rq4-security:
    name: RQ4 — DDS Security Under Acoustic Constraints
    runs-on: ubuntu-24.04
    needs: [rq1-compression, rq3-anomaly-detection]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install poetry
          poetry install --with dev
          sudo apt-get install -y openssl
      - name: Generate test certificates
        run: bash scripts/ci/generate_certs.sh 2
      - name: Run replay attack simulation
        run: poetry run python scripts/attacks/replay_attack.py --duration 30 --seed 42 --output results/rq4-replay.json
      - name: Run spoofing attack simulation
        run: poetry run python scripts/attacks/spoofing_attack.py --target auv_0 --duration 30 --output results/rq4-spoofing.json
      - name: Validate attack detection rate >95%
        run: |
          DETECTION_RATE=$(jq '.detection_rate' results/rq4-replay.json)
          echo "Attack detection rate: $DETECTION_RATE"
          if (( $(echo "$DETECTION_RATE < 0.95" | bc -l) )); then
            echo "RQ4 FAILED: Detection rate $DETECTION_RATE < 0.95"
            exit 1
          fi
          echo "RQ4 security threshold met"
      - name: Upload RQ4 results
        uses: actions/upload-artifact@v4
        with:
          name: rq4-results
          path: results/rq4-*.json
          retention-days: 30

  rq-summary:
    name: RQ Validation Summary
    needs: [rq1-compression, rq2-federation, rq3-anomaly-detection, rq4-security]
    runs-on: ubuntu-24.04
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Generate research report
        run: |
          echo "## Research Question Validation Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "RQ1 (Compression): ${{ needs.rq1-compression.result }}" >> $GITHUB_STEP_SUMMARY
          echo "RQ2 (Federation): ${{ needs.rq2-federation.result }}" >> $GITHUB_STEP_SUMMARY
          echo "RQ3 (Anomaly): ${{ needs.rq3-anomaly-detection.result }}" >> $GITHUB_STEP_SUMMARY
          echo "RQ4 (Security): ${{ needs.rq4-security.result }}" >> $GITHUB_STEP_SUMMARY
      - name: Circuit breaker
        run: |
          if [ "${{ needs.rq1-compression.result }}" != "success" ]; then
            echo "CRITICAL: RQ1 failed. Research claims not validated."
            exit 1
          fi
          if [ "${{ needs.rq3-anomaly-detection.result }}" != "success" ]; then
            echo "CRITICAL: RQ3 failed. Safety guarantees not verified."
            exit 1
          fi
          echo "Critical RQs validated. Research integrity confirmed."
