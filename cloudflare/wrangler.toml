# IoRT-DT: Abyssal Twin — Cloudflare Edge Deployment
# Federated Digital Twin infrastructure for AUV fleet operations.
# Support vessel gateway syncs to this global coordinator via satellite.

name = "abyssal-twin"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# ─── D1 Database ─────────────────────────────────────────────────────────────
# Fleet state, anomaly events, mission metadata.
# Schema mirrors the local SQLite cache on the support vessel for trivial delta sync.
[[d1_databases]]
binding = "FLEET_DB"
database_name = "abyssal-fleet"
database_id = ""                     # Set via: wrangler d1 create abyssal-fleet
migrations_dir = "migrations"

# ─── R2 Object Storage ──────────────────────────────────────────────────────
# ROS2 bag files, compressed mission logs, audit trail.
# $0.015/GB-month — target <$10/month for typical 30-day, 3-AUV mission.
[[r2_buckets]]
binding = "MISSION_STORE"
bucket_name = "abyssal-missions"

# ─── Durable Objects ────────────────────────────────────────────────────────
# Singleton federation coordinator: gossip WebSocket endpoint, state checkpoint.
# Uses Hibernation API to minimize cost during idle ocean missions.
[[durable_objects.bindings]]
name = "FEDERATION_COORDINATOR"
class_name = "FederationCoordinator"

[[migrations]]
tag = "v1"
new_classes = ["FederationCoordinator"]

# ─── Environment Variables ──────────────────────────────────────────────────
[vars]
ENVIRONMENT = "production"
# Conservative Iridium satellite bandwidth limit (kbps)
SATELLITE_BANDWIDTH_LIMIT_KBPS = "50"
# Batch upload interval from vessel (seconds)
BATCH_INTERVAL_SECONDS = "60"

# ═════════════════════════════════════════════════════════════════════════════
# ENVIRONMENT: development (local testing)
# ═════════════════════════════════════════════════════════════════════════════
[env.dev]
name = "abyssal-twin-dev"

[[env.dev.d1_databases]]
binding = "FLEET_DB"
database_name = "abyssal-fleet-dev"
database_id = ""                     # Set via: wrangler d1 create abyssal-fleet-dev
migrations_dir = "migrations"

[[env.dev.r2_buckets]]
binding = "MISSION_STORE"
bucket_name = "abyssal-missions-dev"

[[env.dev.durable_objects.bindings]]
name = "FEDERATION_COORDINATOR"
class_name = "FederationCoordinator"

[env.dev.vars]
ENVIRONMENT = "development"
SATELLITE_BANDWIDTH_LIMIT_KBPS = "1000"
BATCH_INTERVAL_SECONDS = "10"

# ═════════════════════════════════════════════════════════════════════════════
# ENVIRONMENT: staging (pre-production validation)
# ═════════════════════════════════════════════════════════════════════════════
[env.staging]
name = "abyssal-twin-staging"

[[env.staging.d1_databases]]
binding = "FLEET_DB"
database_name = "abyssal-fleet-staging"
database_id = ""                     # Set via: wrangler d1 create abyssal-fleet-staging
migrations_dir = "migrations"

[[env.staging.r2_buckets]]
binding = "MISSION_STORE"
bucket_name = "abyssal-missions-staging"

[[env.staging.durable_objects.bindings]]
name = "FEDERATION_COORDINATOR"
class_name = "FederationCoordinator"

[env.staging.vars]
ENVIRONMENT = "staging"
SATELLITE_BANDWIDTH_LIMIT_KBPS = "100"
BATCH_INTERVAL_SECONDS = "30"

# ═════════════════════════════════════════════════════════════════════════════
# ENVIRONMENT: production (live AUV operations)
# ═════════════════════════════════════════════════════════════════════════════
[env.production]
name = "abyssal-twin"

[[env.production.d1_databases]]
binding = "FLEET_DB"
database_name = "abyssal-fleet"
database_id = ""                     # Set via: wrangler d1 create abyssal-fleet
migrations_dir = "migrations"

[[env.production.r2_buckets]]
binding = "MISSION_STORE"
bucket_name = "abyssal-missions"

[[env.production.durable_objects.bindings]]
name = "FEDERATION_COORDINATOR"
class_name = "FederationCoordinator"

[env.production.vars]
ENVIRONMENT = "production"
SATELLITE_BANDWIDTH_LIMIT_KBPS = "50"
BATCH_INTERVAL_SECONDS = "60"
